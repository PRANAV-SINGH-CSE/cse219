<!-- <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    //function input
    <input type="text" id="num1" placeholder="enter the first two number">
    <input type="text" id="num2" placeholder="enter the second number">
    <button onclick="add()">add</button>
    <button onclick="div()">div</button>
    <button onclick="multi()">multi</button>
    <button onclick="sub()">sub</button>
    <button onclick="percentage()">percentage</button>
<p id="result"></p>
<script>
    function add() {
        num1 = Number(document.getElementById('num1').value)
        num2 = Number(document.getElementById('num2').value)
        sum = num1 + num2
        document.getElementById('result').innerText = "The sum is: " + sum
    }
    function div() {
        num1 = Number(document.getElementById('num1').value)
        num2 = Number(document.getElementById('num2').value)
        sum = num1 / num2
        document.getElementById('result').innerText = "The sum is: " + sum
    }
    function multi() {
        num1 = Number(document.getElementById('num1').value)
        num2 = Number(document.getElementById('num2').value)
        sum = num1 * num2
        document.getElementById('result').innerText = "The sum is: " + sum
    }
    function sub() {
        num1 = Number(document.getElementById('num1').value)
        num2 = Number(document.getElementById('num2').value)
        sum = num1 - num2
        document.getElementById('result').innerText = "The sum is: " + sum
    }
    function percentage() {
        num1 = Number(document.getElementById('num1').value)
        num2 = Number(document.getElementById('num2').value)
        sum = (num1 / num2)*100
        document.getElementById('result').innerText = "The sum is: " + sum
    }

</script>
</body>
</html>
