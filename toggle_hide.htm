<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="para">
        This is a paragraph.
    </p>
    <button id="hide-btn">Hide Paragraph</button>
    <script>
        document.getElementById("hide-btn").onclick=function(){
            let text=document.getElementById("para")
            if(text.style.display=="none"){
                text.style.display="block"
                this.innerText="Hide"
        }else{
            text.style.display="none"
            this.innerText="Show"
        }
    }
    </script>
</body>
</html>
