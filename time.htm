<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clock</title>
</head>
<body>
    <h1 id="clock"></h1>
    <script>
        function updateclock(){
            let now = new Date()
            let timeString=now.toLocaleString()
            document.getElementById("clock").innerText=timeString
        }
        setInterval(updateclock,1000)
        updateclock()//call the function immediately to show the time without waiting for 1 second
        
    </script>
</body>
</html>
