 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="key input" placeholder="press any key">
    <p>key pressed <span id="key-pressed"></span></p>
    <script>
        document.getElementById("key input").onkeypress=function(){
            document.getElementById("key-pressed").innerText=event.key
        }
    </script>
</body>
</html>
