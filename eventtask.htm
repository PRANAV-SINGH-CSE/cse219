<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
<form onsubmit="return false">
        <h1>Form</h1>
        <img src="1.jpg" width="300" id="hiding"><br><br>
        <p id="hide">
            This is a paragraph.
        </p><br><br>
        <button id="hide-btn">Hide hiding and image</button><br><br><br>

         <select id="colorselect">
        <option value="Hindi">Hindi</option>
        <option value="English">English</option>
        <option value="maths">maths</option>
        <option value="science">science</option>
    </select>
    <p>
        selected color : <span id="selected-sub">Hindi</span>
    </p> 
    <br><Br>
        

    <button type="submit"  id="submit">submit</button><br><br>


     <script>
        document.getElementById("colorselect").onchange = 
        function(){
            document.getElementById("selected-sub").innerText =this.value
        }
        document.getElementById("submit").onclick = 
        function (){
            document.getElementById("submit").innerText = "submitted";
            document.getElementById("submit").style.backgroundColor = "green"
        }

        document.getElementById("hide-btn").onclick=function(){
            let img=document.getElementById("hiding")
            let text=document.getElementById("hide")
            if(text.style.display=="none"){
                text.style.display="block"
                img.style.display="block"
                this.innerText="Hide"
        }else{
            text.style.display="none"
            text.style.display="none"
            this.innerText="Show"
        }
    }
        
    </script>
    </form>
</body>
</html>
