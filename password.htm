<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="password" id="pasds" placeholder="Enter your password">
    <button onclick="toggle()">Check Password</button>
    <script>
        function toggle(){
            let pass=document.getElementById("pasds")
            if(pass.type=="password")
        {
            pass.type="text"
        }
        else{
            pass.type="password"
        }
        }
    </script>
</body>
</html>
